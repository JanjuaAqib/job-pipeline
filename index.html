<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Pipeline — PM / PO / Delivery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#283140;
    --ink:#e8edf2; --muted:#8b97a7; --accent:#ffd23f; --accent2:#3ddc97;
    --remote:#4aa8ff; --spons:#ff7a59; --uk:#b48cff;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --disp:'Fraunces',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    background-image:radial-gradient(circle at 15% 10%,rgba(255,210,63,.06),transparent 40%),radial-gradient(circle at 85% 90%,rgba(61,220,151,.05),transparent 40%);
    min-height:100vh;padding:24px 16px;}
  .wrap{max-width:1040px;margin:0 auto}
  header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);padding-bottom:20px}
  h1{font-family:var(--disp);font-weight:900;font-size:clamp(28px,5vw,44px);line-height:.95;letter-spacing:-.02em}
  h1 em{font-style:italic;color:var(--accent)}
  .sub{color:var(--muted);font-size:14px;margin-top:8px;max-width:560px;line-height:1.5}
  .tag-mono{font-family:var(--mono);font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:.15em}
  .freshness{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin:24px 0 18px;align-items:center}
  .controls input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:10px 14px;border-radius:10px;font-family:var(--mono);font-size:13px;flex:1;min-width:200px}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:999px;font-size:12px;cursor:pointer;font-family:var(--mono);transition:.15s;user-select:none}
  .chip.on{background:var(--accent);color:#0e1116;border-color:var(--accent);font-weight:600}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;flex:1;min-width:120px}
  .stat .n{font-family:var(--disp);font-size:28px;font-weight:900}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
  .job{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:12px;transition:.15s;position:relative;overflow:hidden}
  .job:hover{border-color:#3a4659;transform:translateY(-1px)}
  .job .score{position:absolute;top:0;right:0;background:var(--panel2);font-family:var(--mono);font-size:11px;padding:6px 12px;border-bottom-left-radius:10px;color:var(--accent)}
  .job h3{font-family:var(--disp);font-size:20px;font-weight:600;padding-right:60px;line-height:1.1}
  .job .co{color:var(--muted);font-size:14px;margin:4px 0 10px;font-family:var(--mono)}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .badge{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:4px 9px;border-radius:6px;border:1px solid}
  .b-remote{color:var(--remote);border-color:var(--remote);background:rgba(74,168,255,.08)}
  .b-spons{color:var(--spons);border-color:var(--spons);background:rgba(255,122,89,.08)}
  .b-uk{color:var(--uk);border-color:var(--uk);background:rgba(180,140,255,.08)}
  .b-tag{color:var(--muted);border-color:var(--line)}
  .b-src{color:#7fe3c0;border-color:#2f6f5b;background:rgba(61,220,151,.07)}
  .job .why{font-size:12.5px;color:#a9b6c6;line-height:1.5;margin-bottom:12px}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .actions a,.actions button{font-family:var(--mono);font-size:12px;padding:8px 14px;border-radius:8px;text-decoration:none;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:.15s}
  .actions a.apply{background:var(--accent);color:#0e1116;border-color:var(--accent);font-weight:600}
  .actions a:hover,.actions button:hover{filter:brightness(1.15)}
  .actions button.done{background:rgba(61,220,151,.15);border-color:var(--accent2);color:var(--accent2)}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-family:var(--mono);font-size:14px;line-height:1.6}
  .loader{text-align:center;padding:50px;font-family:var(--mono);color:var(--accent)}
  footer{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:11px;font-family:var(--mono);line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="tag-mono">Aqib · PM / PO / Delivery Manager</div>
      <h1>Job <em>Pipeline</em></h1>
      <p class="sub">EU-sponsorship &amp; remote roles + UK roles, refreshed automatically each day by a scheduled job — even while your laptop is closed.</p>
      <div class="freshness" id="fresh">Loading…</div>
    </div>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="filter: keyword, company, city…">
    <span class="chip on" data-f="all">All</span>
    <span class="chip" data-f="remote">Remote only</span>
    <span class="chip" data-f="spons">Likely sponsor</span>
    <span class="chip" data-f="pm">Product/Delivery</span>
  </div>

  <div class="stats" id="stats"></div>
  <div id="list"><div class="loader">Loading jobs…</div></div>
  <footer id="foot"></footer>
</div>

<script>
let RAW=[], FILTER="all", doneSet=new Set();
const SPONS=["visa","sponsor","relocation","relocate","blue card","work permit","international"];
const TITLES=["product manager","product owner","delivery manager","program manager","project manager","product lead","technical product","associate product","producer","scrum master","delivery lead"];

function isSponsor(j){const b=((j.title||"")+" "+(j.description||"")+" "+(j.tags||[]).join(" ")).toLowerCase();return SPONS.some(k=>b.includes(k));}
function isPM(j){const t=(j.title||"").toLowerCase();return TITLES.some(tt=>t.includes(tt));}
function esc(s){return (s||"").replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));}

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let rows=RAW.slice().sort((a,b)=>(b._score||0)-(a._score||0)).filter(j=>{
    if(FILTER==="remote" && !j.remote) return false;
    if(FILTER==="spons" && !isSponsor(j)) return false;
    if(FILTER==="pm" && !isPM(j)) return false;
    if(q){const b=((j.title||"")+(j.company_name||"")+(j.location||"")).toLowerCase();if(!b.includes(q))return false;}
    return true;
  });
  const st=document.getElementById('stats');
  st.innerHTML=`
    <div class="stat"><div class="n">${RAW.length}</div><div class="l">Jobs</div></div>
    <div class="stat"><div class="n">${RAW.filter(isPM).length}</div><div class="l">Product/Delivery</div></div>
    <div class="stat"><div class="n">${RAW.filter(isSponsor).length}</div><div class="l">Likely sponsor</div></div>
    <div class="stat"><div class="n">${RAW.filter(j=>j.remote).length}</div><div class="l">Remote</div></div>`;
  const list=document.getElementById('list');
  if(!rows.length){list.innerHTML='<div class="empty">No matches. Try "All" or clear the search.</div>';return;}
  list.innerHTML=rows.slice(0,100).map(j=>{
    const id=j.slug||j.url, done=doneSet.has(id), badges=[];
    if(j.remote) badges.push('<span class="badge b-remote">Remote</span>');
    if(isSponsor(j)) badges.push('<span class="badge b-spons">Likely sponsor</span>');
    const loc=(j.location||"").toLowerCase();
    if(loc.includes("united kingdom")||loc.includes("london")||loc.includes("uk")) badges.push('<span class="badge b-uk">UK · no sponsor needed</span>');
    if(j.source) badges.push('<span class="badge b-src">'+esc(j.source)+(j.country&&j.country!=="EU"?" · "+esc(j.country):"")+'</span>');
    (j.tags||[]).slice(0,3).forEach(t=>badges.push('<span class="badge b-tag">'+esc(t)+'</span>'));
    const why=(j._why&&j._why.length)? j._why.join(" · ") : "general match";
    return `<div class="job">
      <div class="score">${j._score||0} pts</div>
      <h3>${esc(j.title||"Untitled")}</h3>
      <div class="co">${esc(j.company_name||"")} · ${esc(j.location||"—")}</div>
      <div class="badges">${badges.join("")}</div>
      <div class="why">Why ranked: ${esc(why)}</div>
      <div class="actions">
        <a class="apply" href="${j.url}" target="_blank" rel="noopener">Open &amp; apply ↗</a>
        <button onclick="genCV('${esc(j.title||'').replace(/'/g,"")}','${esc(j.company_name||'').replace(/'/g,"")}')">Draft tailored CV brief</button>
        <button class="${done?'done':''}" onclick="toggleDone('${(id||'').replace(/'/g,"\\'")}',this)">${done?'✓ Applied':'Mark applied'}</button>
      </div>
    </div>`;
  }).join("");
}

window.toggleDone=(id,btn)=>{
  if(doneSet.has(id)){doneSet.delete(id);btn.textContent="Mark applied";btn.classList.remove('done');}
  else{doneSet.add(id);btn.textContent="✓ Applied";btn.classList.add('done');}
};
window.genCV=(title,co)=>{
  const brief=`TAILORED APPLICATION BRIEF — paste this to Claude

ROLE: ${title}
COMPANY: ${co}

Use my master profile. Weave in where the JD allows:
• Figma UX wireframes
• Game design tasks (4 yrs, multiple shipped titles)
• Art direction & coordination with artists
• Developer coordination
• QA & testing every build before release
LinkedIn: linkedin.com/in/aqib-javed-pm
Generate: (1) a 1-page tailored CV, (2) a short cover letter, noting visa/relocation readiness if EU.`;
  (navigator.clipboard?navigator.clipboard.writeText(brief):Promise.reject())
    .then(()=>alert("CV brief copied ✓\nPaste into a new Claude chat for:\n\n"+title+" @ "+co))
    .catch(()=>prompt("Copy this brief:",brief));
};

document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');FILTER=c.dataset.f;render();
}));
document.getElementById('search').addEventListener('input',render);

async function load(){
  try{
    const r=await fetch('jobs.json?_='+Date.now()); // same-origin, no CORS
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    RAW=d.jobs||[];
    const when=d.generated_at? new Date(d.generated_at).toLocaleString() : "unknown";
    document.getElementById('fresh').textContent="Last refreshed: "+when+"  ·  "+RAW.length+" jobs";
    render();
  }catch(e){
    document.getElementById('list').innerHTML='<div class="empty">No jobs.json yet ('+e.message+').<br>This appears after the GitHub Action runs once. Go to your repo → Actions tab → run "Update jobs daily" manually, then reload.</div>';
  }
}
document.getElementById('foot').innerHTML=
`SOURCE: arbeitnow.com job API, fetched server-side by GitHub Actions (no CORS), ranked against your PM/PO/Delivery profile, written to jobs.json.<br>
SCHEDULE: runs daily ~7am UK while your devices are off. Open this page on your phone anytime to see the latest pull. Not a submission bot — you click Apply on the company site.`;
load();
</script>
</body>
</html>
